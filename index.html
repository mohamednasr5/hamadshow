<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0a0e17">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="NASR LIVE">
  <meta name="description" content="NASR LIVE - Premium IPTV Experience">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="format-detection" content="telephone=no">
  <title>NASR LIVE</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="assets/icons/icon.svg">
  <link rel="apple-touch-icon" href="assets/icons/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/hls.js@latest">
  <link rel="stylesheet" href="css/app.css">
</head>
<body>
  <!-- Splash Screen -->
  <div id="splash-screen" class="splash-screen">
    <div class="splash-content" style="display:flex;flex-direction:column;align-items:center;justify-content:center;">
      <div class="splash-logo">
        <div class="splash-logo-inner">
          <svg viewBox="0 0 120 120" fill="none" style="width:80px;height:80px;">
            <defs>
              <linearGradient id="splash-grad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" style="stop-color:#6c5ce7"/>
                <stop offset="100%" style="stop-color:#00cec9"/>
              </linearGradient>
            </defs>
            <circle cx="60" cy="60" r="55" stroke="url(#splash-grad)" stroke-width="3" fill="none"/>
            <polygon points="45,35 45,85 90,60" fill="url(#splash-grad)"/>
          </svg>
        </div>
      </div>
      <h1 class="splash-app-name">NASR LIVE</h1>
      <div class="splash-loading-bar"></div>
    </div>
  </div>

  <!-- Auth Screen -->
  <div id="auth-screen" class="auth-screen hidden">
    <div class="auth-card">
      <div class="auth-card-logo">
        <svg viewBox="0 0 120 120" fill="none" width="64" height="64">
          <defs>
            <linearGradient id="auth-grad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" style="stop-color:#6c5ce7"/>
              <stop offset="100%" style="stop-color:#00cec9"/>
            </linearGradient>
          </defs>
          <circle cx="60" cy="60" r="55" stroke="url(#auth-grad)" stroke-width="3" fill="none"/>
          <polygon points="45,35 45,85 90,60" fill="url(#auth-grad)"/>
        </svg>
      </div>
      <h1 class="auth-card-title" data-i18n="auth.title">NASR LIVE</h1>
      <p class="auth-card-subtitle" data-i18n="auth.subtitle">Premium IPTV Experience</p>

      <!-- Login Form -->
      <form id="login-form" class="auth-form active">
        <div class="auth-input-group">
          <label for="login-email" data-i18n="auth.email">البريد الإلكتروني</label>
          <div class="auth-input-wrapper">
            <input type="email" id="login-email" required autocomplete="email" data-i18n-placeholder="auth.emailPlaceholder">
          </div>
        </div>
        <div class="auth-input-group">
          <label for="login-password" data-i18n="auth.password">كلمة المرور</label>
          <div class="auth-input-wrapper">
            <input type="password" id="login-password" required autocomplete="current-password" data-i18n-placeholder="auth.passwordPlaceholder">
          </div>
        </div>
        <button type="submit" class="auth-btn"><span class="btn-text" data-i18n="auth.login">تسجيل الدخول</span><span class="btn-loader"></span></button>
        <div class="auth-switch">
          <span data-i18n="auth.noAccount">ليس لديك حساب؟</span>
          <button type="button" id="show-register" data-i18n="auth.register">إنشاء حساب</button>
        </div>
      </form>

      <!-- Register Form -->
      <form id="register-form" class="auth-form">
        <div class="auth-input-group">
          <label for="reg-name" data-i18n="auth.name">الاسم</label>
          <div class="auth-input-wrapper">
            <input type="text" id="reg-name" required data-i18n-placeholder="auth.namePlaceholder">
          </div>
        </div>
        <div class="auth-input-group">
          <label for="reg-email" data-i18n="auth.email">البريد الإلكتروني</label>
          <div class="auth-input-wrapper">
            <input type="email" id="reg-email" required autocomplete="email" data-i18n-placeholder="auth.emailPlaceholder">
          </div>
        </div>
        <div class="auth-input-group">
          <label for="reg-password" data-i18n="auth.password">كلمة المرور</label>
          <div class="auth-input-wrapper">
            <input type="password" id="reg-password" required minlength="6" autocomplete="new-password" data-i18n-placeholder="auth.passwordPlaceholder">
          </div>
        </div>
        <div class="auth-input-group">
          <label for="reg-confirm" data-i18n="auth.confirmPassword">تأكيد كلمة المرور</label>
          <div class="auth-input-wrapper">
            <input type="password" id="reg-confirm" required minlength="6" autocomplete="new-password" data-i18n-placeholder="auth.confirmPasswordPlaceholder">
          </div>
        </div>
        <button type="submit" class="auth-btn"><span class="btn-text" data-i18n="auth.createAccount">إنشاء حساب</span><span class="btn-loader"></span></button>
        <div class="auth-switch">
          <span data-i18n="auth.hasAccount">لديك حساب بالفعل؟</span>
          <button type="button" id="show-login" data-i18n="auth.login">تسجيل الدخول</button>
        </div>
      </form>

      <!-- Server Config -->
      <div id="server-config-section" class="auth-divider" style="flex-direction:column;gap:12px;">
        <span data-i18n="auth.orConfig">أو إعداد السيرفر</span>
      </div>
      <button type="button" id="show-server-config" class="auth-btn" style="background:var(--bg-surface);border:1px solid var(--border);margin-top:-4px;"><span class="btn-text" data-i18n="auth.serverConfig">إعداد سيرفر Xtream</span></button>

      <!-- Xtream Login Form -->
      <form id="xtream-form" class="auth-form">
        <div class="auth-input-group">
          <label for="xtream-url" data-i18n="auth.serverUrl">رابط السيرفر</label>
          <div class="auth-input-wrapper">
            <input type="url" id="xtream-url" placeholder="http://example.com:8080" required>
          </div>
        </div>
        <div class="auth-input-group">
          <label for="xtream-user" data-i18n="auth.username">اسم المستخدم</label>
          <div class="auth-input-wrapper">
            <input type="text" id="xtream-user" required data-i18n-placeholder="auth.usernamePlaceholder">
          </div>
        </div>
        <div class="auth-input-group">
          <label for="xtream-pass" data-i18n="auth.password">كلمة المرور</label>
          <div class="auth-input-wrapper">
            <input type="password" id="xtream-pass" required data-i18n-placeholder="auth.passwordPlaceholder">
          </div>
        </div>
        <button type="submit" class="auth-btn"><span class="btn-text" data-i18n="auth.connect">اتصال</span><span class="btn-loader"></span></button>
        <div class="auth-switch">
          <button type="button" id="show-login-from-xtream" data-i18n="auth.backToLogin">العودة لتسجيل الدخول</button>
        </div>
      </form>

      <div id="auth-error" class="auth-error"></div>
    </div>
  </div>

  <!-- Main App Shell -->
  <div id="app-shell" class="app-shell hidden">
    <!-- Top Bar -->
    <header id="top-bar" class="top-bar">
      <div class="top-bar-left">
        <button id="menu-toggle" class="icon-btn" aria-label="Menu">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <h1 class="app-title">NASR LIVE</h1>
      </div>
      <div class="top-bar-right">
        <button id="search-btn-top" class="icon-btn" aria-label="Search">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        </button>
        <button id="profile-btn" class="icon-btn" aria-label="Profile">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        </button>
      </div>
    </header>

    <!-- Sidebar (TV/Desktop) -->
    <aside id="sidebar" class="sidebar">
      <nav class="sidebar-nav">
        <a href="#/" class="nav-item active" data-page="home" data-focusable>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          <span data-i18n="nav.home">الرئيسية</span>
        </a>
        <a href="#/live" class="nav-item" data-page="live" data-focusable>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
          <span data-i18n="nav.live">التلفزيون المباشر</span>
        </a>
        <a href="#/movies" class="nav-item" data-page="movies" data-focusable>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="2.18" ry="2.18"/><line x1="7" y1="2" x2="7" y2="22"/><line x1="17" y1="2" x2="17" y2="22"/><line x1="2" y1="12" x2="22" y2="12"/><line x1="2" y1="7" x2="7" y2="7"/><line x1="2" y1="17" x2="7" y2="17"/><line x1="17" y1="7" x2="22" y2="7"/><line x1="17" y1="17" x2="22" y2="17"/></svg>
          <span data-i18n="nav.movies">الأفلام</span>
        </a>
        <a href="#/series" class="nav-item" data-page="series" data-focusable>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="15" rx="2" ry="2"/><polyline points="17 2 12 7 7 2"/></svg>
          <span data-i18n="nav.series">المسلسلات</span>
        </a>
        <a href="#/favorites" class="nav-item" data-page="favorites" data-focusable>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
          <span data-i18n="nav.favorites">المفضلة</span>
        </a>
        <a href="#/search" class="nav-item" data-page="search" data-focusable>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <span data-i18n="nav.search">البحث</span>
        </a>
        <div class="nav-divider"></div>
        <a href="#/settings" class="nav-item" data-page="settings" data-focusable>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
          <span data-i18n="nav.settings">الإعدادات</span>
        </a>
      </nav>
    </aside>

    <!-- Main Content Area -->
    <main id="main-content" class="main-content">
      <div id="page-container" class="page-container"></div>
    </main>

    <!-- Bottom Navigation (Mobile) -->
    <nav id="bottom-nav" class="bottom-nav">
      <a href="#/" class="bottom-nav-item active" data-page="home" data-focusable>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        <span data-i18n="nav.home">الرئيسية</span>
      </a>
      <a href="#/live" class="bottom-nav-item" data-page="live" data-focusable>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
        <span data-i18n="nav.live">مباشر</span>
      </a>
      <a href="#/movies" class="bottom-nav-item" data-page="movies" data-focusable>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="2.18" ry="2.18"/><line x1="7" y1="2" x2="7" y2="22"/><line x1="17" y1="2" x2="17" y2="22"/></svg>
        <span data-i18n="nav.movies">أفلام</span>
      </a>
      <a href="#/series" class="bottom-nav-item" data-page="series" data-focusable>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="15" rx="2" ry="2"/><polyline points="17 2 12 7 7 2"/></svg>
        <span data-i18n="nav.series">مسلسلات</span>
      </a>
      <a href="#/settings" class="bottom-nav-item" data-page="settings" data-focusable>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        <span data-i18n="nav.settings">إعدادات</span>
      </a>
    </nav>
  </div>

  <!-- Player Overlay -->
  <div id="player-overlay" class="player-overlay hidden">
    <div id="player-container" class="player-container">
      <video id="video-player" class="video-player" playsinline></video>
      <div id="player-controls" class="player-controls">
        <div class="controls-top">
          <button id="player-back" class="icon-btn-lg" aria-label="Back">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
          </button>
          <div id="player-title" class="player-title"></div>
          <div class="controls-top-right">
            <button id="player-pip" class="icon-btn-lg hidden" aria-label="PiP">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><rect x="11" y="9" width="9" height="6" rx="1"/></svg>
            </button>
            <button id="player-cast" class="icon-btn-lg hidden" aria-label="Cast">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 16.1A5 5 0 0 1 5.9 20M2 12.05A9 9 0 0 1 9.95 20M2 8V6a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2h-6"/><line x1="2" y1="20" x2="2.01" y2="20"/></svg>
            </button>
          </div>
        </div>
        <div id="player-tap-zone" class="tap-zone"></div>
        <div class="controls-center">
          <button id="player-prev" class="icon-btn-xl" aria-label="Previous">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="19 20 9 12 19 4"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
          </button>
          <button id="player-play" class="icon-btn-xl play-btn" aria-label="Play/Pause">
            <svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21"/></svg>
          </button>
          <button id="player-next" class="icon-btn-xl" aria-label="Next">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 4 15 12 5 20"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
          </button>
        </div>
        <div class="controls-bottom">
          <span id="player-current-time" class="time-display">0:00</span>
          <div id="player-progress" class="progress-bar">
            <div id="player-buffer" class="progress-buffer"></div>
            <div id="player-progress-fill" class="progress-fill"></div>
            <div id="player-progress-thumb" class="progress-thumb"></div>
          </div>
          <span id="player-duration" class="time-display">0:00</span>
          <div class="controls-bottom-right">
            <button id="player-subtitles" class="icon-btn-lg" aria-label="Subtitles">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="6" y1="12" x2="18" y2="12"/></svg>
            </button>
            <button id="player-audio" class="icon-btn-lg" aria-label="Audio tracks">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
            </button>
            <button id="player-speed" class="icon-btn-lg" aria-label="Speed">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 19 22 12 13 5"/><polygon points="2 19 11 12 2 5"/></svg>
            </button>
            <button id="player-fullscreen" class="icon-btn-lg" aria-label="Fullscreen">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>
            </button>
          </div>
        </div>
      </div>
      <div id="player-gesture-feedback" class="gesture-feedback hidden">
        <div class="gesture-icon"></div>
        <div class="gesture-value"></div>
      </div>
      <div id="player-loading" class="player-loading hidden">
        <div class="spinner"></div>
      </div>
      <div id="player-error" class="player-error hidden">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <p data-i18n="player.error">حدث خطأ في التشغيل</p>
        <button id="player-retry" class="btn-primary" data-i18n="player.retry">إعادة المحاولة</button>
      </div>
    </div>
    <!-- Mini Player -->
    <div id="mini-player" class="mini-player hidden">
      <div id="mini-player-thumbnail" class="mini-player-thumb"></div>
      <div class="mini-player-info">
        <div id="mini-player-title" class="mini-player-title"></div>
        <div id="mini-player-channel" class="mini-player-channel"></div>
      </div>
      <div class="mini-player-controls">
        <button id="mini-play" class="icon-btn" aria-label="Play/Pause">
          <svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21"/></svg>
        </button>
        <button id="mini-close" class="icon-btn" aria-label="Close">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
    </div>
  </div>

  <!-- Profile Menu -->
  <div id="profile-menu" class="profile-menu hidden">
    <div class="profile-menu-header">
      <div id="profile-avatar" class="profile-avatar"></div>
