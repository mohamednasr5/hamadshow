<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <meta name="theme-color" content="#0A0A0F">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="hammadshow">
  <meta name="description" content="hammadshow — تطبيق البث المباشر | من برمجة وتطوير المهندس محمد حماد">
  <meta name="mobile-web-app-capable" content="yes">
  <title>hammadshow</title>
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./icons/icon-192.png">
  <link rel="icon" type="image/png" href="./icons/icon-192.png">
  <style>
    /* Critical CSS — prevents flash */
    body{background:#0A0A0F;color:#F5F5F7;margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Noto Sans Arabic',Arial,sans-serif;overflow-x:hidden}
    #app{display:none}
    .splash{position:fixed;inset:0;z-index:9999;background:#0A0A0F;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;transition:opacity .4s}
    .splash.hide{opacity:0;pointer-events:none}
    .splash-gem{width:64px;height:64px;border-radius:18px;background:linear-gradient(135deg,#7B2FFF,#FF2D55);display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:800;color:#fff;box-shadow:0 8px 32px rgba(123,47,255,.5);animation:gemPulse 2s ease-in-out infinite;position:relative;overflow:hidden}
    .splash-gem::after{content:'';position:absolute;top:0;left:0;right:0;height:45%;background:rgba(255,255,255,.15)}
    @keyframes gemPulse{0%,100%{box-shadow:0 8px 32px rgba(123,47,255,.5)}50%{box-shadow:0 8px 48px rgba(123,47,255,.8)}}
    .splash-text{font-size:18px;font-weight:700;letter-spacing:-.02em}
    .splash-sub{font-size:11px;color:#52526A;animation:fadeLoop 1.5s ease-in-out infinite}
    @keyframes fadeLoop{0%,100%{opacity:.4}50%{opacity:.8}}
  </style>
  <link rel="stylesheet" href="./style.css">
</head>
<body>

  <!-- SPLASH SCREEN -->
  <div class="splash" id="splash">
    <div class="splash-gem">H</div>
    <div class="splash-text">hammadshow</div>
    <div class="splash-sub">...جاري التحميل</div>
  </div>

  <!-- APP -->
  <div id="app">

    <!-- Background Orbs -->
    <div class="bg-orbs">
      <div class="orb orb-1"></div>
      <div class="orb orb-2"></div>
      <div class="orb orb-3"></div>
    </div>

    <!-- HEADER -->
    <header class="header">
      <div class="header-logo">
        <div class="header-gem">H</div>
        <div class="header-info" id="header-info">
          <h1>hammadshow</h1>
          <p>من برمجة وتطوير المهندس محمد حماد</p>
        </div>
      </div>
      <div class="header-actions">
        <button class="lang-btn" onclick="App.setLang(App._lang==='en'?'ar':'en')" id="lang-toggle-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/><path d="M2 12h20"/></svg>
          <span id="lang-label">EN</span>
        </button>
      </div>
    </header>

    <!-- MAIN CONTENT -->
    <main class="main">

      <!-- ─── HOME TAB ─── -->
      <div class="tab active" id="tab-home">
        <div style="padding:16px;max-width:1200px;margin:0 auto">

          <!-- Search -->
          <div class="search-wrap">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
            <input id="search-input" class="search-input" type="text" placeholder="بحث...">
          </div>

          <!-- Install Banner -->
          <div id="install-banner" class="hidden"></div>

          <!-- Welcome -->
          <div id="welcome-section">
            <div class="welcome">
              <h2>مرحباً بك في hammadshow</h2>
              <p>استمتع بأفضل تجربة بث مباشر</p>
            </div>
          </div>

          <!-- Banners -->
          <div id="banners-section" class="hidden" style="margin-bottom:24px"></div>

          <!-- Category Pills -->
          <div id="cat-pills" class="hidden" style="margin-bottom:24px"></div>

          <!-- Live TV Section -->
          <div style="margin-bottom:24px">
            <div class="section-header">
              <div class="section-bar"></div>
              <h3 id="live-tv-title">بث مباشر</h3>
              <div class="section-badge badge-live"><span class="ch-live-dot"></span> LIVE</div>
            </div>
            <div id="home-channels">
              <div class="skeleton-grid">
                <div class="skel-card"><div class="skel-thumb"></div><div class="skel-text"></div></div>
                <div class="skel-card"><div class="skel-thumb"></div><div class="skel-text"></div></div>
                <div class="skel-card"><div class="skel-thumb"></div><div class="skel-text"></div></div>
                <div class="skel-card"><div class="skel-thumb"></div><div class="skel-text"></div></div>
                <div class="skel-card"><div class="skel-thumb"></div><div class="skel-text"></div></div>
                <div class="skel-card"><div class="skel-thumb"></div><div class="skel-text"></div></div>
              </div>
            </div>
          </div>

          <!-- Category Sections -->
          <div id="cat-sections"></div>

        </div>
      </div>

      <!-- ─── CATEGORIES TAB ─── -->
      <div class="tab" id="tab-categories"></div>

      <!-- ─── FAVORITES TAB ─── -->
      <div class="tab" id="tab-favorites"></div>

      <!-- ─── SETTINGS TAB ─── -->
      <div class="tab" id="tab-settings"></div>

    </main>

    <!-- VIDEO PLAYER MODAL -->
    <div class="player-overlay" id="player-overlay" onclick="if(event.target===this)App.closePlayer()">
      <div class="player-modal">
        <div class="player-video-wrap">
          <video id="player-video" controls playsinline></video>
          <button class="player-close" onclick="App.closePlayer()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
          </button>
        </div>
        <div class="player-info-bar">
          <div class="player-ch-info">
            <div class="player-ch-logo" id="player-logo">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><rect width="20" height="15" x="2" y="7" rx="2"/><polyline points="17 2 12 7 7 2"/></svg>
            </div>
            <div style="min-width:0;flex:1">
              <div class="player-ch-name" id="player-ch-name"></div>
              <div class="player-ch-desc" id="player-ch-desc"></div>
            </div>
          </div>
          <button class="player-fav-btn" id="player-fav">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>
          </button>
        </div>
      </div>
    </div>

    <!-- BOTTOM NAVIGATION -->
    <nav class="bottom-nav">
      <div class="bottom-nav-inner">
        <button class="nav-item active" data-tab="home" onclick="App.switchTab('home')">
          <div class="nav-indicator"></div>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          <span class="nav-label" data-tab="home">الرئيسية</span>
        </button>
        <button class="nav-item" data-tab="categories" onclick="App.switchTab('categories')">
          <div class="nav-indicator"></div>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/></svg>
          <span class="nav-label" data-tab="categories">التصنيفات</span>
        </button>
        <button class="nav-item" data-tab="favorites" onclick="App.switchTab('favorites')">
          <div class="nav-indicator"></div>
          <div class="nav-badge" id="fav-badge" style="display:none">0</div>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>
          <span class="nav-label" data-tab="favorites">المفضلة</span>
        </button>
        <button class="nav-item" data-tab="settings" onclick="App.switchTab('settings')">
          <div class="nav-indicator"></div>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
          <span class="nav-label" data-tab="settings">الإعدادات</span>
        </button>
      </div>
    </nav>

  </div>

  <script src="./app.js"></script>
  <script>
    // Hide splash after app renders
    function hideSplash() {
      const splash = document.getElementById('splash');
      const app = document.getElementById('app');
      if (splash && app) {
        splash.classList.add('hide');
        app.style.display = 'flex';
        setTimeout(() => splash.remove(), 500);
      }
    }
    // Wait for app init
    const checkInit = setInterval(() => {
      if (window.App) {
        clearInterval(checkInit);
        setTimeout(hideSplash, 600);
      }
    }, 100);
    // Fallback
    setTimeout(hideSplash, 4000);

    // Fix lang toggle
    document.getElementById('lang-toggle-btn').addEventListener('click', function(e) {
      e.stopPropagation();
      const isAr = document.documentElement.lang === 'ar';
      App.setLang(isAr ? 'en' : 'ar');
    });
    // Update lang label on init
    const updateLangLabel = setInterval(() => {
      const label = document.getElementById('lang-label');
      if (label && window.App) {
        label.textContent = document.documentElement.lang === 'ar' ? 'EN' : 'عربي';
        clearInterval(updateLangLabel);
      }
    }, 200);
    // Override setLang to also update lang label
    const origSetLang = App.setLang;
    App.setLang = function(lang) {
      origSetLang(lang);
      const label = document.getElementById('lang-label');
      if (label) label.textContent = lang === 'ar' ? 'EN' : 'عربي';
      // Update live tv title
      const title = document.getElementById('live-tv-title');
      if (title) title.textContent = lang === 'ar' ? 'بث مباشر' : 'Live TV';
      // Update splash sub
    };
  </script>
</body>
</html>
