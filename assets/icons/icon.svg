<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#151a28"/>
      <stop offset="55%" stop-color="#0a0e17"/>
      <stop offset="100%" stop-color="#05060a"/>
    </linearGradient>
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f6d675"/>
      <stop offset="50%" stop-color="#d4af37"/>
      <stop offset="100%" stop-color="#a8791f"/>
    </linearGradient>
    <linearGradient id="red-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff5252"/>
      <stop offset="100%" stop-color="#c0392b"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="38%" r="65%">
      <stop offset="0%" stop-color="#d4af37" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#d4af37" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Base -->
  <rect width="512" height="512" rx="104" fill="url(#bg-grad)"/>
  <rect width="512" height="512" rx="104" fill="url(#glow)"/>

  <!-- Thin gold frame -->
  <rect x="14" y="14" width="484" height="484" rx="94" fill="none" stroke="url(#gold-grad)" stroke-width="4" opacity="0.55"/>

  <!-- Play badge -->
  <circle cx="256" cy="196" r="72" fill="none" stroke="url(#gold-grad)" stroke-width="6" opacity="0.9"/>
  <polygon points="232,160 232,232 292,196" fill="url(#gold-grad)"/>

  <!-- NASR -->
  <text x="256" y="338" font-family="Arial, Helvetica, sans-serif" font-size="86" font-weight="800"
        text-anchor="middle" fill="url(#gold-grad)" letter-spacing="6">NASR</text>

  <!-- LIVE -->
  <text x="256" y="410" font-family="Arial, Helvetica, sans-serif" font-size="66" font-weight="800"
        text-anchor="middle" fill="url(#red-grad)" letter-spacing="14">LIVE</text>

  <!-- Underline accent -->
  <rect x="176" y="428" width="160" height="6" rx="3" fill="url(#red-grad)" opacity="0.85"/>
</svg>
