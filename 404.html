<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NASR LIVE</title>
  <script>
    // GitHub Pages SPA redirect: preserve the hash and redirect to index.html
    // This handles direct navigation or refresh on SPA routes
    (function() {
      var hash = window.location.hash;
      var path = window.location.pathname;
      // Check if we're already at the root index
      if (path === '/' || path.endsWith('/index.html')) {
        return;
      }
      // Redirect to root while preserving the hash fragment
      var base = window.location.origin + window.location.pathname.replace(/[^/]*$/, '');
      window.location.replace(base + 'index.html' + hash);
    })();
  </script>
</head>
<body></body>
</html>
