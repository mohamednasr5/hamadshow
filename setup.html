<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <meta name="theme-color" content="#0A0A0F">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="hammadshow">
  <meta name="mobile-web-app-capable" content="yes">
  <title>hammadshow — الإعداد</title>
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./icons/icon-192.png">
  <link rel="icon" href="./icons/icon-192.png">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#0A0A0F;--surface:#13131A;--card:#1C1C26;--border:#2A2A3A;--v:#7B2FFF;--r:#FF2D55;--g:#22C55E;--y:#FFD700;--text:#F5F5F7;--sub:#8E8EA0;--muted:#52526A;--grad:linear-gradient(135deg,#7B2FFF,#FF2D55);--ez:cubic-bezier(.22,1,.36,1)}
    html{height:100%;-webkit-text-size-adjust:100%}
    body{min-height:100vh;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Noto Sans Arabic',Arial,sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;-webkit-font-smoothing:antialiased}
    [dir="rtl"]{text-align:right}
    input{font-family:inherit;color:inherit}
    button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}

    .setup-bg{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
    .orb{position:absolute;border-radius:50%;filter:blur(120px)}
    .orb-1{width:80vmax;height:80vmax;opacity:.12;background:radial-gradient(circle,rgba(123,47,255,.3),transparent 60%);top:-30vmax;left:-25vmax}
    .orb-2{width:55vmax;height:55vmax;opacity:.1;background:radial-gradient(circle,rgba(255,45,85,.2),transparent 60%);bottom:-18vmax;right:-14vmax}

    .setup-card{position:relative;z-index:1;width:100%;max-width:420px;background:var(--card);border:1px solid var(--border);border-radius:20px;padding:32px 24px;box-shadow:0 20px 60px rgba(0,0,0,.5)}

    .setup-logo{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:8px}
    .setup-icon{width:52px;height:52px;border-radius:14px;background:linear-gradient(135deg,#1A1A2E,#0F0F1A);border:2px solid rgba(255,215,0,.25);display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(255,215,0,.12)}
    .setup-icon-text{font-size:24px;font-weight:900;line-height:1}
    .setup-icon-text .hl{color:#FFD700}
    .setup-icon-text .pl{color:#FF2D55;font-size:18px;margin-right:-2px}
    .setup-title{font-size:22px;font-weight:800;text-align:center;margin-bottom:4px}
    .setup-subtitle{font-size:13px;color:var(--sub);text-align:center;margin-bottom:28px}

    .form-group{margin-bottom:16px}
    .form-label{display:block;font-size:12px;font-weight:600;color:var(--sub);margin-bottom:6px}
    .form-input{width:100%;height:46px;border-radius:12px;background:var(--surface);border:1px solid var(--border);padding:0 14px;font-size:14px;color:var(--text);outline:none;transition:border-color .2s,box-shadow .2s}
    .form-input::placeholder{color:var(--muted)}
    .form-input:focus{border-color:rgba(123,47,255,.5);box-shadow:0 0 0 3px rgba(123,47,255,.1)}
    .form-input.error{border-color:var(--r);box-shadow:0 0 0 3px rgba(255,45,85,.1)}

    .input-eye-wrap{position:relative}
    .input-eye-wrap .form-input{padding-inline-end:44px}
    .eye-btn{position:absolute;top:0;bottom:0;inset-inline-end:4px;width:38px;display:flex;align-items:center;justify-content:center;color:var(--muted);transition:color .2s}
    .eye-btn:hover{color:var(--sub)}
    .eye-btn svg{width:18px;height:18px}
    .eye-btn.active{color:var(--y)}

    .connect-btn{width:100%;height:50px;border-radius:14px;background:var(--grad);color:#fff;font-size:15px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:24px;transition:transform .15s var(--ez),opacity .15s;box-shadow:0 6px 24px rgba(123,47,255,.3)}
    .connect-btn:active{transform:scale(.97);opacity:.9}
    .connect-btn:disabled{opacity:.5;pointer-events:none}
    .connect-btn svg{width:18px;height:18px}
    .connect-btn.error{background:var(--r);box-shadow:0 6px 24px rgba(255,45,85,.3)}

    .status-msg{text-align:center;margin-top:16px;font-size:12px;font-weight:600;min-height:18px;transition:all .3s}
    .status-msg.loading{color:var(--v)}
    .status-msg.success{color:var(--g)}
    .status-msg.error{color:var(--r)}

    .setup-footer{text-align:center;margin-top:20px;font-size:11px;color:var(--muted);line-height:1.7}
    .setup-footer a{color:var(--y);text-decoration:none;font-weight:600}

    .spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}

    .skip-link{display:block;text-align:center;margin-top:14px;font-size:12px;color:var(--muted);text-decoration:none;cursor:pointer}
    .skip-link:hover{color:var(--sub)}

    .has-config-info{background:rgba(34,194,94,.08);border:1px solid rgba(34,194,94,.2);border-radius:12px;padding:12px 14px;margin-bottom:20px;display:flex;align-items:center;gap:10px;font-size:12px}
    .has-config-info .dot{width:8px;height:8px;border-radius:50%;background:var(--g);flex-shrink:0}
  </style>
</head>
<body>

  <div class="setup-bg"><div class="orb orb-1"></div><div class="orb orb-2"></div></div>

  <div class="setup-card">
    <div class="setup-logo">
      <div class="setup-icon">
        <div class="setup-icon-text"><span class="hl">H</span><span class="pl">+</span></div>
      </div>
    </div>
    <div class="setup-title">إعدادات السيرفر</div>
    <div class="setup-subtitle">هذه الشاشة خاصة بالمالك فقط — بيانات السيرفر لا تظهر للمستخدمين</div>

    <div id="has-config" style="display:none">
      <div class="has-config-info">
        <div class="dot"></div>
        <span>يوجد إعدادات محفوظة مسبقاً — البيانات مخفية، اضغط 👁 لإظهارها عند الحاجة</span>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">رابط السيرفر</label>
      <div class="input-eye-wrap">
        <input class="form-input" id="xt-url" type="password" placeholder="http://example.com:8080" autocomplete="off" autocapitalize="off" spellcheck="false">
        <button type="button" class="eye-btn" data-target="xt-url" onclick="toggleReveal(this)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8Z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">اسم المستخدم</label>
      <div class="input-eye-wrap">
        <input class="form-input" id="xt-user" type="password" placeholder="username" autocomplete="off" autocapitalize="off" spellcheck="false">
        <button type="button" class="eye-btn" data-target="xt-user" onclick="toggleReveal(this)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8Z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">كلمة المرور</label>
      <div class="input-eye-wrap">
        <input class="form-input" id="xt-pass" type="password" placeholder="password" autocomplete="off" autocapitalize="off" spellcheck="false">
        <button type="button" class="eye-btn" data-target="xt-pass" onclick="toggleReveal(this)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8Z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">رابط البروكسي (اختياري — لحل مشاكل تشغيل البث)</label>
      <div class="input-eye-wrap">
        <input class="form-input" id="xt-proxy" type="password" placeholder="https://your-proxy.workers.dev" autocomplete="off" autocapitalize="off" spellcheck="false">
        <button type="button" class="eye-btn" data-target="xt-proxy" onclick="toggleReveal(this)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8Z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
    </div>

    <button class="connect-btn" id="connect-btn" onclick="doConnect()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12.55a11 11 0 0 1 14.08 0"/><path d="M1.42 9a16 16 0 0 1 21.16 0"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><line x1="12" y1="20" x2="12.01" y2="20"/></svg>
      <span id="btn-text">حفظ وبدء المشاهدة</span>
    </button>

    <div class="status-msg" id="status"></div>

    <a class="skip-link" id="skip-link" style="display:none" href="./index.html">تخطي — استخدام الإعدادات السابقة ←</a>

    <div class="setup-footer">
      من برمجة وتطوير المهندس محمد حماد<br>
      <a href="https://www.facebook.com/en.mohamed.nasr" target="_blank" rel="noopener">تابعنا على فيسبوك</a>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
  <script>
    const FIREBASE_CONFIG={apiKey:"AIzaSyAfImJ7x3pe0GYSrl7hDz_sMb_GarcpJ9E",authDomain:"nasr-live.firebaseapp.com",databaseURL:"https://nasr-live-default-rtdb.firebaseio.com",projectId:"nasr-live",storageBucket:"nasr-live.firebasestorage.app",messagingSenderId:"215945991656",appId:"1:215945991656:web:41ea1faa18496ff86cc05d"};
    firebase.initializeApp(FIREBASE_CONFIG);
    const db=firebase.database();

    function getDeviceId(){let id=localStorage.getItem("hs-device-id");if(!id){id="d_"+Date.now()+"_"+Math.random().toString(36).substr(2,9);localStorage.setItem("hs-device-id",id)}return id}
    function getConfigRef(){return db.ref("devices/"+getDeviceId()+"/config")}

    // Load existing config
    (async()=>{
      const saved=localStorage.getItem("hs-xtc");
      if(saved){
        try{
          const c=JSON.parse(saved);
          if(c.url&&c.user&&c.pass){
            document.getElementById("xt-url").value=c.url;
            document.getElementById("xt-user").value=c.user;
            document.getElementById("xt-pass").value=c.pass;
            document.getElementById("xt-proxy").value=c.proxy||"";
            document.getElementById("has-config").style.display="block";
            document.getElementById("skip-link").style.display="block";
          }
        }catch(e){}
      }
      // Also try Firebase
      try{
        const snap=await getConfigRef().once("value");
        const fb=snap.val();
        if(fb&&fb.url&&fb.user&&fb.pass){
          if(!document.getElementById("xt-url").value){
            document.getElementById("xt-url").value=fb.url;
            document.getElementById("xt-user").value=fb.user;
            document.getElementById("xt-pass").value=fb.pass;
            document.getElementById("xt-proxy").value=fb.proxy||"";
            document.getElementById("has-config").style.display="block";
            document.getElementById("skip-link").style.display="block";
          }
        }
      }catch(e){console.warn("Firebase read error:",e)}
    })();

    async function doConnect(){
      const url=document.getElementById("xt-url").value.trim();
      const user=document.getElementById("xt-user").value.trim();
      const pass=document.getElementById("xt-pass").value.trim();
      const proxy=document.getElementById("xt-proxy").value.trim().replace(/\/+$/,"");
      if(!url||!user||!pass){
        setStatus("يرجى ملء جميع الحقول","error");
        if(!url)document.getElementById("xt-url").classList.add("error");
        if(!user)document.getElementById("xt-user").classList.add("error");
        if(!pass)document.getElementById("xt-pass").classList.add("error");
        return;
      }
      // Remove error states
      document.querySelectorAll(".form-input").forEach(i=>i.classList.remove("error"));

      const btn=document.getElementById("connect-btn");
      const btnText=document.getElementById("btn-text");
      btn.disabled=true;btnText.innerHTML='<div class="spinner"></div> جاري الاتصال...';
      setStatus("جاري التحقق من السيرفر...","loading");

      // Normalize URL
      let serverUrl=url.replace(/\/+$/,"");
      if(!serverUrl.startsWith("http"))serverUrl="http://"+serverUrl;
      const ep=`${serverUrl}/player_api.php?username=${encodeURIComponent(user)}&password=${encodeURIComponent(pass)}`;

      try{
        const resp=await fetch(ep);
        if(!resp.ok)throw new Error("HTTP "+resp.status);
        const data=await resp.json();
        if(data.user_info&&data.user_info.auth===1){
          // Success - save everywhere
          const config={url:serverUrl,user,pass,proxy:proxy||""};
          localStorage.setItem("hs-xtc",JSON.stringify(config));
          try{await getConfigRef().set(config)}catch(e){console.warn("Firebase save error:",e)}
          setStatus("تم الاتصال بنجاح! جاري التحويل...","success");
          setTimeout(()=>{window.location.href="./index.html"},1000);
        }else{
          throw new Error("Invalid credentials");
        }
      }catch(e){
        btn.disabled=false;btnText.innerHTML='حفظ وبدء المشاهدة';
        setStatus("فشل الاتصال — تحقق من البيانات","error");
        btn.classList.add("error");
        setTimeout(()=>btn.classList.remove("error"),3000);
      }
    }

    function toggleReveal(btn){
      const id=btn.getAttribute('data-target');
      const input=document.getElementById(id);
      if(!input)return;
      const revealed=input.type==='text';
      input.type=revealed?'password':'text';
      btn.classList.toggle('active',!revealed);
    }

    function setStatus(msg,type){
      const el=document.getElementById("status");
      el.textContent=msg;el.className="status-msg "+type;
    }
  </script>
</body>
</html>
